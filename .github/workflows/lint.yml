name: Code Quality Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check Node.js syntax
      run: |
        node --check backend/server.js
        for f in backend/routes/*.js; do node --check "$f"; done

    - name: Check HTML
      run: |
        # 简单的HTML标签检查
        grep -r "</html>" frontend/public/ || echo "HTML files OK"
